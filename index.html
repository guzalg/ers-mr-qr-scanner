<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>ERS Mr. QR Scanner v0.8C</title>

  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

  <style>
    :root {
      --green: #1f7a1f;
      --green-bg: #d9f2d9;
      --yellow: #b36b00;
      --yellow-bg: #fff1cc;
      --red: #a61b1b;
      --red-bg: #ffe0e0;
      --gray: #555;
      --light: #f4f4f4;
      --border: #ddd;
    }

    body {
      font-family: Arial, sans-serif;
      background: var(--light);
      margin: 0;
      padding: 18px;
    }

    .app {
      max-width: 520px;
      margin: 0 auto;
      background: #fff;
      padding: 22px;
      border-radius: 14px;
      border: 1px solid var(--border);
    }

    h1 {
      text-align: center;
      margin: 0 0 6px 0;
      font-size: 25px;
    }

    .subtitle {
      text-align: center;
      color: var(--gray);
      font-size: 13px;
      margin-bottom: 16px;
      line-height: 1.4;
    }

    .status {
      text-align: center;
      font-size: 14px;
      font-weight: bold;
      margin-bottom: 12px;
      padding: 10px;
      border-radius: 8px;
      background: #eeeeee;
      color: var(--gray);
      border: 1px solid var(--border);
    }

    .status-ready {
      background: var(--green-bg);
      color: var(--green);
      border: 2px solid var(--green);
    }

    .status-waiting {
      background: var(--yellow-bg);
      color: var(--yellow);
      border: 2px solid var(--yellow);
    }

    .status-error {
      background: var(--red-bg);
      color: var(--red);
      border: 2px solid var(--red);
    }

    #reader {
      width: 100%;
      min-height: 280px;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid var(--border);
      background: #111;
      margin-bottom: 12px;
    }

    .button-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 12px;
    }

    button {
      width: 100%;
      padding: 14px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      border-radius: 8px;
      border: 1px solid #aaa;
    }

    .primary {
      background: var(--green-bg);
      color: var(--green);
      border: 2px solid var(--green);
    }

    .danger {
      background: var(--red-bg);
      color: var(--red);
      border: 2px solid var(--red);
    }

    .result {
      margin-top: 12px;
      padding: 16px;
      border-radius: 10px;
      background: #eeeeee;
      border: 1px solid var(--border);
      min-height: 120px;
      text-align: center;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 18px;
      line-height: 1.4;
    }

    .result-valid {
      background: var(--green-bg);
      border: 3px solid var(--green);
    }

    .result-invalid {
      background: var(--red-bg);
      border: 3px solid var(--red);
    }

    .payload-label {
      font-size: 12px;
      font-weight: bold;
      color: var(--gray);
      margin-bottom: 6px;
    }

    .payload {
      font-family: Arial, sans-serif;
      font-size: 18px;
      font-weight: bold;
    }

    .checkin-panel {
      display: none;
      margin-top: 14px;
      padding: 16px;
      border-radius: 12px;
      background: var(--green-bg);
      border: 3px solid var(--green);
      text-align: center;
    }

    .checkin-panel.visible {
      display: block;
    }

    .checkin-title {
      font-size: 14px;
      font-weight: bold;
      color: var(--green);
      margin-bottom: 8px;
    }

    .checkin-id {
      font-size: 26px;
      font-weight: bold;
      margin-bottom: 14px;
      word-break: break-word;
    }

    .big-checkin-button {
      width: 100%;
      padding: 22px;
      font-size: 24px;
      font-weight: bold;
      border-radius: 12px;
      border: 3px solid var(--green);
      background: var(--green);
      color: white;
      cursor: pointer;
    }

    .big-checkin-button:active {
      transform: scale(0.98);
    }

    .note {
      margin-top: 12px;
      font-size: 12px;
      color: var(--gray);
      line-height: 1.4;
      text-align: center;
    }

    .small {
      font-size: 12px;
      color: var(--gray);
      text-align: center;
      margin-top: 8px;
    }
  </style>
</head>

<body>
  <div class="app">
    <h1>ERS Mr. QR</h1>

    <div class="subtitle">
      Camera Scanner Prototype v0.8C<br>
      Scan + validate + confirm button — backend not connected yet.
    </div>

    <div id="status" class="status status-waiting">
      Camera not started.
    </div>

    <div id="reader"></div>

    <div class="button-row">
      <button type="button" class="primary" onclick="startScanner()">
        START CAMERA
      </button>

      <button type="button" class="danger" onclick="stopScanner()">
        STOP
      </button>
    </div>

    <div id="result" class="result">
      <div class="payload-label">SCANNED PAYLOAD</div>
      <div class="payload">Nothing scanned yet.</div>
    </div>

    <div id="checkinPanel" class="checkin-panel">
      <div class="checkin-title">READY TO CHECK IN</div>
      <div id="checkinRegistrationId" class="checkin-id">-</div>

      <button
        type="button"
        class="big-checkin-button"
        onclick="handleCheckInButtonClick()"
      >
        CHECK IN THIS PERSON
      </button>
    </div>

    <div class="note">
      Expected ERS payload format:<br>
      <strong>ERS|EVT-2026-001|FS26-0001</strong>
    </div>

    <div class="small">
      v0.8C | GitHub Pages scanner + payload validation
    </div>
  </div>

  <script>
    //====================================================
    // ERS MR. QR - CONFIGURATION
    //====================================================

    var ERS_CONFIG = {
      systemPrefix: 'ERS',
      eventCode: 'EVT-2026-001',
      registrationPrefix: 'FS26',
      registrationDigits: 4,
      allowPlainRegistrationId: false
    };


    //====================================================
    // ERS MR. QR - STATE
    //====================================================

    var html5QrCode = null;
    var scannerRunning = false;
    var lastScannedValue = '';
    var lastScannedAt = 0;

    var currentPayload = '';
    var currentRegistrationId = '';
    var currentValidation = null;


    //====================================================
    // ERS MR. QR - UI HELPERS
    //====================================================

    function setStatus(text, className) {
      var box = document.getElementById('status');
      box.className = 'status ' + (className || '');
      box.textContent = text;
    }


    function setResult(payload, className) {
      var box = document.getElementById('result');

      box.className = 'result ' + (className || '');
      box.innerHTML =
        '<div class="payload-label">SCANNED PAYLOAD</div>' +
        '<div class="payload">' + escapeHtml(payload) + '</div>';
    }


    function escapeHtml(value) {
      return String(value || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }


    function showCheckInPanel(registrationId) {
      var panel = document.getElementById('checkinPanel');
      var idBox = document.getElementById('checkinRegistrationId');

      if (!registrationId) {
        hideCheckInPanel();
        return;
      }

      idBox.textContent = registrationId;
      panel.className = 'checkin-panel visible';
    }


    function hideCheckInPanel() {
      var panel = document.getElementById('checkinPanel');
      var idBox = document.getElementById('checkinRegistrationId');

      idBox.textContent = '-';
      panel.className = 'checkin-panel';
    }


    //====================================================
    // ERS MR. QR - PAYLOAD VALIDATION
    //====================================================

    function validateQrPayload(rawPayload) {
      var payload = String(rawPayload || '').trim().toUpperCase();

      if (!payload) {
        return invalidValidation_('Empty QR payload.');
      }

      if (payload.indexOf('|') === -1) {
        if (ERS_CONFIG.allowPlainRegistrationId) {
          return validatePlainRegistrationId_(payload);
        }

        return invalidValidation_(
          'Invalid ERS QR format.\n\nExpected:\n' +
          ERS_CONFIG.systemPrefix + '|' +
          ERS_CONFIG.eventCode + '|' +
          ERS_CONFIG.registrationPrefix + '-0001'
        );
      }

      var parts = payload.split('|');

      if (parts.length !== 3) {
        return invalidValidation_(
          'Invalid ERS QR structure.\n\nExpected 3 parts:\n' +
          'SYSTEM|EVENT CODE|REGISTRATION ID'
        );
      }

      var systemPrefix = String(parts[0] || '').trim().toUpperCase();
      var eventCode = String(parts[1] || '').trim().toUpperCase();
      var registrationId = String(parts[2] || '').trim().toUpperCase();

      if (systemPrefix !== ERS_CONFIG.systemPrefix) {
        return invalidValidation_(
          'Invalid QR system prefix.\n\nExpected: ' +
          ERS_CONFIG.systemPrefix +
          '\nFound: ' +
          systemPrefix
        );
      }

      if (eventCode !== ERS_CONFIG.eventCode) {
        return invalidValidation_(
          'Invalid event code.\n\nExpected: ' +
          ERS_CONFIG.eventCode +
          '\nFound: ' +
          eventCode
        );
      }

      var registrationCheck = validateRegistrationId_(registrationId);

      if (!registrationCheck.ok) {
        return registrationCheck;
      }

      return {
        ok: true,
        code: 'VALID_ERS_QR',
        message: 'Valid ERS QR payload.',
        payload: payload,
        systemPrefix: systemPrefix,
        eventCode: eventCode,
        registrationId: registrationId
      };
    }


    function validatePlainRegistrationId_(registrationId) {
      var registrationCheck = validateRegistrationId_(registrationId);

      if (!registrationCheck.ok) {
        return registrationCheck;
      }

      return {
        ok: true,
        code: 'VALID_PLAIN_REGISTRATION_ID',
        message: 'Valid Registration ID.',
        payload: registrationId,
        systemPrefix: '',
        eventCode: '',
        registrationId: registrationId
      };
    }


    function validateRegistrationId_(registrationId) {
      registrationId = String(registrationId || '').trim().toUpperCase();

      var pattern = new RegExp(
        '^' +
        ERS_CONFIG.registrationPrefix +
        '-\\d{' +
        ERS_CONFIG.registrationDigits +
        '}$'
      );

      if (!pattern.test(registrationId)) {
        return invalidValidation_(
          'Invalid Registration ID format.\n\nExpected format:\n' +
          ERS_CONFIG.registrationPrefix +
          '-' +
          '0'.repeat(ERS_CONFIG.registrationDigits - 1) +
          '1' +
          '\nFound:\n' +
          registrationId
        );
      }

      return {
        ok: true,
        code: 'VALID_REGISTRATION_ID',
        message: 'Valid Registration ID.',
        registrationId: registrationId
      };
    }


    function invalidValidation_(message) {
      return {
        ok: false,
        code: 'INVALID_QR_PAYLOAD',
        message: message,
        payload: '',
        registrationId: ''
      };
    }


    //====================================================
    // ERS MR. QR - SCANNER EVENTS
    //====================================================

    function showScanSuccess(decodedText) {
      var now = Date.now();

      // Prevent repeated rapid reads of the same QR.
      if (
        decodedText === lastScannedValue &&
        now - lastScannedAt < 2500
      ) {
        return;
      }

      lastScannedValue = decodedText;
      lastScannedAt = now;

      var validation = validateQrPayload(decodedText);

      currentValidation = validation;
      currentPayload = String(decodedText || '').trim();
      currentRegistrationId = validation.ok ? validation.registrationId : '';

      if (!validation.ok) {
        hideCheckInPanel();

        setResult(
          'INVALID QR\n\n' +
          'Scanned:\n' +
          currentPayload +
          '\n\nReason:\n' +
          validation.message,
          'result-invalid'
        );

        setStatus('Invalid ERS QR code.', 'status-error');

        if (navigator.vibrate) {
          navigator.vibrate([200, 80, 200]);
        }

        return;
      }

      setResult(
        validation.message +
        '\n\nPayload:\n' +
        currentPayload +
        '\n\nRegistration ID:\n' +
        validation.registrationId,
        'result-valid'
      );

      showCheckInPanel(validation.registrationId);

      setStatus('Valid QR detected. Ready to check in.', 'status-ready');

      if (navigator.vibrate) {
        navigator.vibrate(150);
      }
    }


    function showScanError(errorMessage) {
      // This fires constantly while scanning, so we intentionally keep it silent.
    }


    //====================================================
    // ERS MR. QR - CHECK-IN BUTTON PLACEHOLDER
    //====================================================

    function handleCheckInButtonClick() {
      if (!currentValidation || !currentValidation.ok || !currentRegistrationId) {
        setStatus('No valid ERS QR ready for check-in.', 'status-error');
        hideCheckInPanel();
        return;
      }

      // v0.8C placeholder only.
      // v0.8D will connect this button to the ERS Apps Script endpoint.
      setStatus(
        'Validation passed. Backend not connected yet.',
        'status-waiting'
      );

      setResult(
        'CHECK-IN BUTTON PRESSED\n\n' +
        'Validation: PASSED\n\n' +
        'Payload:\n' +
        currentPayload +
        '\n\nRegistration ID:\n' +
        currentRegistrationId +
        '\n\nNo Google Sheet update was made yet.',
        'result-valid'
      );

      if (navigator.vibrate) {
        navigator.vibrate([100, 80, 100]);
      }
    }


    //====================================================
    // ERS MR. QR - CAMERA CONTROL
    //====================================================

    function startScanner() {
      if (scannerRunning) {
        setStatus('Camera already running.', 'status-ready');
        return;
      }

      if (!window.Html5Qrcode) {
        setStatus('QR scanner library did not load.', 'status-error');
        return;
      }

      setStatus('Requesting camera permission...', 'status-waiting');

      html5QrCode = new Html5Qrcode('reader');

      Html5Qrcode.getCameras()
        .then(function(cameras) {
          if (!cameras || cameras.length === 0) {
            setStatus('No camera found on this device.', 'status-error');
            return;
          }

          var selectedCameraId = chooseBackCamera(cameras);

          return html5QrCode.start(
            selectedCameraId,
            {
              fps: 10,
              qrbox: {
                width: 250,
                height: 250
              },
              aspectRatio: 1.0
            },
            showScanSuccess,
            showScanError
          );
        })
        .then(function() {
          scannerRunning = true;
          setStatus('Camera running. Point at ERS QR code.', 'status-ready');
        })
        .catch(function(error) {
          setStatus(
            'Camera error: ' + getReadableError(error),
            'status-error'
          );
        });
    }


    function chooseBackCamera(cameras) {
      // Prefer rear/back/environment camera when label is available.
      for (var i = 0; i < cameras.length; i++) {
        var label = String(cameras[i].label || '').toLowerCase();

        if (
          label.indexOf('back') !== -1 ||
          label.indexOf('rear') !== -1 ||
          label.indexOf('environment') !== -1
        ) {
          return cameras[i].id;
        }
      }

      // Many phones only reveal labels after permission.
      // If unknown, use the last camera, which is often rear camera.
      return cameras[cameras.length - 1].id;
    }


    function stopScanner() {
      if (!html5QrCode || !scannerRunning) {
        setStatus('Camera is not running.', 'status-waiting');
        return;
      }

      html5QrCode.stop()
        .then(function() {
          scannerRunning = false;
          hideCheckInPanel();
          setStatus('Camera stopped.', 'status-waiting');
        })
        .catch(function(error) {
          setStatus(
            'Stop error: ' + getReadableError(error),
            'status-error'
          );
        });
    }


    function getReadableError(error) {
      if (!error) return 'Unknown error';

      if (typeof error === 'string') return error;

      if (error.message) return error.message;

      return JSON.stringify(error);
    }
  </script>
</body>
</html>
