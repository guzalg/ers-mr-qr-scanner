<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>ERS Mr. QR Scanner v0.8D1</title>

  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

  <style>
    :root {
      --green: #1f7a1f;
      --green-bg: #d9f2d9;
      --yellow: #b36b00;
      --yellow-bg: #fff1cc;
      --red: #a61b1b;
      --red-bg: #ffe0e0;
      --gray: #555;
      --light: #f4f4f4;
      --border: #ddd;
    }

    body {
      font-family: Arial, sans-serif;
      background: var(--light);
      margin: 0;
      padding: 18px;
    }

    .app {
      max-width: 520px;
      margin: 0 auto;
      background: #fff;
      padding: 22px;
      border-radius: 14px;
      border: 1px solid var(--border);
    }

    h1 {
      text-align: center;
      margin: 0 0 6px 0;
      font-size: 25px;
    }

    .subtitle, .note, .small {
      text-align: center;
      color: var(--gray);
      font-size: 12px;
      line-height: 1.4;
    }

    .subtitle {
      margin-bottom: 16px;
      font-size: 13px;
    }

    .status {
      text-align: center;
      font-size: 14px;
      font-weight: bold;
      margin-bottom: 12px;
      padding: 10px;
      border-radius: 8px;
      background: #eeeeee;
      color: var(--gray);
      border: 1px solid var(--border);
    }

    .status-ready {
      background: var(--green-bg);
      color: var(--green);
      border: 2px solid var(--green);
    }

    .status-waiting {
      background: var(--yellow-bg);
      color: var(--yellow);
      border: 2px solid var(--yellow);
    }

    .status-error {
      background: var(--red-bg);
      color: var(--red);
      border: 2px solid var(--red);
    }

    #reader {
      width: 100%;
      min-height: 280px;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid var(--border);
      background: #111;
      margin-bottom: 12px;
    }

    .button-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 12px;
    }

    button {
      width: 100%;
      padding: 14px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      border-radius: 8px;
      border: 1px solid #aaa;
    }

    .primary {
      background: var(--green-bg);
      color: var(--green);
      border: 2px solid var(--green);
    }

    .danger {
      background: var(--red-bg);
      color: var(--red);
      border: 2px solid var(--red);
    }

    input {
      width: 100%;
      padding: 12px;
      font-size: 15px;
      box-sizing: border-box;
      margin-bottom: 8px;
      border-radius: 8px;
      border: 1px solid #aaa;
    }

    .settings {
      margin-bottom: 12px;
      padding: 12px;
      border-radius: 10px;
      background: #f7f7f7;
      border: 1px solid var(--border);
    }

    .settings-title {
      font-size: 13px;
      font-weight: bold;
      margin-bottom: 8px;
      color: var(--gray);
      text-align: center;
    }

    .result {
      margin-top: 12px;
      padding: 16px;
      border-radius: 10px;
      background: #eeeeee;
      border: 1px solid var(--border);
      min-height: 120px;
      text-align: center;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 18px;
      line-height: 1.4;
    }

    .result-valid {
      background: var(--green-bg);
      border: 3px solid var(--green);
    }

    .result-invalid {
      background: var(--red-bg);
      border: 3px solid var(--red);
    }

    .result-duplicate {
      background: var(--yellow-bg);
      border: 3px solid var(--yellow);
    }

    .payload-label {
      font-size: 12px;
      font-weight: bold;
      color: var(--gray);
      margin-bottom: 6px;
    }

    .payload {
      font-size: 18px;
      font-weight: bold;
    }

    .checkin-panel {
      display: none;
      margin-top: 14px;
      padding: 16px;
      border-radius: 12px;
      background: var(--green-bg);
      border: 3px solid var(--green);
      text-align: center;
    }

    .checkin-panel.visible {
      display: block;
    }

    .checkin-title {
      font-size: 14px;
      font-weight: bold;
      color: var(--green);
      margin-bottom: 8px;
    }

    .checkin-id {
      font-size: 26px;
      font-weight: bold;
      margin-bottom: 14px;
      word-break: break-word;
    }

    .big-checkin-button {
      width: 100%;
      padding: 22px;
      font-size: 24px;
      font-weight: bold;
      border-radius: 12px;
      border: 3px solid var(--green);
      background: var(--green);
      color: white;
      cursor: pointer;
    }

    .big-checkin-button:disabled {
      opacity: 0.6;
      cursor: wait;
    }
  </style>
</head>

<body>
  <div class="app">
    <h1>ERS Mr. QR</h1>

    <div class="subtitle">
      Camera Scanner v0.8D1<br>
      Scan + validate + check in through ERS backend.
    </div>

    <div class="settings">
      <div class="settings-title">Scanner Settings</div>

      <input id="scannerToken" type="password" placeholder="Scanner token / PIN">

      <input id="stationName" type="text" placeholder="Station name" value="MR_QR_CAMERA">

      <input id="operatorName" type="text" placeholder="Operator name" value="Mr. QR Operator">

      <button type="button" class="primary" onclick="saveScannerSettings()">
        SAVE SETTINGS
      </button>
    </div>

    <div id="status" class="status status-waiting">
      Camera not started.
    </div>

    <div id="reader"></div>

    <div class="button-row">
      <button type="button" class="primary" onclick="startScanner()">
        START CAMERA
      </button>

      <button type="button" class="danger" onclick="stopScanner()">
        STOP
      </button>
    </div>

    <div id="result" class="result">
      <div class="payload-label">SCANNED PAYLOAD</div>
      <div class="payload">Nothing scanned yet.</div>
    </div>

    <div id="checkinPanel" class="checkin-panel">
      <div class="checkin-title">READY TO CHECK IN</div>
      <div id="checkinRegistrationId" class="checkin-id">-</div>

      <button
        id="checkinButton"
        type="button"
        class="big-checkin-button"
        onclick="handleCheckInButtonClick()"
      >
        CHECK IN THIS PERSON
      </button>
    </div>

    <div class="note">
      Expected ERS payload format:<br>
      <strong>ERS|EVT-2026-001|FS26-0001</strong>
    </div>

    <div class="small">
      v0.8D1 | Controlled scanner lifecycle + ERS backend
    </div>
  </div>

  <script>
    //====================================================
    // CONFIGURATION
    //====================================================

    var ERS_CONFIG = {
      systemPrefix: 'ERS',
      eventCode: 'EVT-2026-001',
      registrationPrefix: 'FS26',
      registrationDigits: 4,
      allowPlainRegistrationId: false,

      // Replace this with your DEV Apps Script /exec URL.
      webAppUrl: 'https://script.google.com/macros/s/AKfycbzWBt3xKZvQNGRuLr_e1MyYA1Y_bd5RrFp5gJBCiQckT71fvrydAcL64YXQAlUxWx-g/exec'
    };


    //====================================================
    // STATE
    //====================================================

    var SCANNER_STATE = {
      STOPPED: 'STOPPED',
      SCANNING: 'SCANNING',
      QR_CAPTURED: 'QR_CAPTURED',
      SUBMITTING: 'SUBMITTING',
      RESULT_SHOWN: 'RESULT_SHOWN',
      WAITING_FOR_QR_CLEAR: 'WAITING_FOR_QR_CLEAR'
    };

    var html5QrCode = null;
    var scannerRunning = false;
    var scannerState = SCANNER_STATE.STOPPED;

    var lastScannedValue = '';
    var lastScannedAt = 0;
    var lastQrSeenAt = 0;
    var qrClearStartedAt = 0;

    var currentPayload = '';
    var currentRegistrationId = '';
    var currentValidation = null;
    var capturedPayloadKey = '';
    var checkingIn = false;
    var resultTimer = null;

    var RESULT_DISPLAY_MS = 4000;
    var QR_CLEAR_MS = 800;
    var ENDPOINT_TIMEOUT_MS = 10000;


    //====================================================
    // SETTINGS
    //====================================================

    function loadScannerSettings() {
      document.getElementById('scannerToken').value =
        localStorage.getItem('ersMrQrToken') || '';

      document.getElementById('stationName').value =
        localStorage.getItem('ersMrQrStation') || 'MR_QR_CAMERA';

      document.getElementById('operatorName').value =
        localStorage.getItem('ersMrQrOperator') || 'Mr. QR Operator';
    }


    function saveScannerSettings() {
      localStorage.setItem(
        'ersMrQrToken',
        document.getElementById('scannerToken').value.trim()
      );

      localStorage.setItem(
        'ersMrQrStation',
        document.getElementById('stationName').value.trim() || 'MR_QR_CAMERA'
      );

      localStorage.setItem(
        'ersMrQrOperator',
        document.getElementById('operatorName').value.trim() || 'Mr. QR Operator'
      );

      setStatus('Scanner settings saved.', 'status-ready');
    }


    function getScannerToken() {
      return document.getElementById('scannerToken').value.trim();
    }


    function getStationName() {
      return document.getElementById('stationName').value.trim() || 'MR_QR_CAMERA';
    }


    function getOperatorName() {
      return document.getElementById('operatorName').value.trim() || 'Mr. QR Operator';
    }


    //====================================================
    // UI HELPERS
    //====================================================

    function setStatus(text, className) {
      var box = document.getElementById('status');
      box.className = 'status ' + (className || '');
      box.textContent = text;
    }


    function setResult(payload, className) {
      var box = document.getElementById('result');

      box.className = 'result ' + (className || '');
      box.innerHTML =
        '<div class="payload-label">RESULT</div>' +
        '<div class="payload">' + escapeHtml(payload) + '</div>';
    }


    function escapeHtml(value) {
      return String(value || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }


    function showCheckInPanel(registrationId) {
      var panel = document.getElementById('checkinPanel');
      var idBox = document.getElementById('checkinRegistrationId');

      if (!registrationId) {
        hideCheckInPanel();
        return;
      }

      idBox.textContent = registrationId;
      panel.className = 'checkin-panel visible';
    }


    function hideCheckInPanel() {
      var panel = document.getElementById('checkinPanel');
      var idBox = document.getElementById('checkinRegistrationId');

      idBox.textContent = '-';
      panel.className = 'checkin-panel';
    }


    function setCheckInButtonBusy(isBusy) {
      checkingIn = isBusy;

      var button = document.getElementById('checkinButton');
      button.disabled = isBusy;
      button.textContent = isBusy ? 'CHECKING IN...' : 'CHECK IN THIS PERSON';
    }


    //====================================================
    // SCANNER LIFECYCLE
    //====================================================

    function clearResultTimer() {
      if (resultTimer) {
        clearTimeout(resultTimer);
        resultTimer = null;
      }
    }


    function normalizePayloadKey(value) {
      return String(value || '').trim().toUpperCase();
    }


    function clearCurrentAttendee() {
      currentPayload = '';
      currentRegistrationId = '';
      currentValidation = null;
      capturedPayloadKey = '';
      lastQrSeenAt = 0;
      qrClearStartedAt = 0;
      hideCheckInPanel();
      setCheckInButtonBusy(false);
    }


    function resetForNextScan(showReadyMessage) {
      clearResultTimer();
      clearCurrentAttendee();

      lastScannedValue = '';
      lastScannedAt = 0;

      scannerState = scannerRunning
        ? SCANNER_STATE.SCANNING
        : SCANNER_STATE.STOPPED;

      if (showReadyMessage !== false && scannerRunning) {
        setStatus('Camera running. Ready for next QR.', 'status-ready');
        setResult('Ready for next scan.', '');
      }
    }


    function scheduleAutomaticRearm() {
      clearResultTimer();
      scannerState = SCANNER_STATE.RESULT_SHOWN;

      resultTimer = setTimeout(function() {
        resultTimer = null;
        scannerState = SCANNER_STATE.WAITING_FOR_QR_CLEAR;

        qrClearStartedAt = 0;

        setStatus(
          'Move the QR away. Scanner will rearm automatically.',
          'status-waiting'
        );
      }, RESULT_DISPLAY_MS);
    }


    function tryAutomaticRearm() {
      if (
        !scannerRunning ||
        scannerState !== SCANNER_STATE.WAITING_FOR_QR_CLEAR
      ) {
        return;
      }

      var now = Date.now();

      if (!qrClearStartedAt) {
        qrClearStartedAt = now;
        return;
      }

      if (now - qrClearStartedAt >= QR_CLEAR_MS) {
        resetForNextScan(true);
      }
    }


    function restoreCapturedQrForRetry(message) {
      scannerState = SCANNER_STATE.QR_CAPTURED;
      setCheckInButtonBusy(false);
      showCheckInPanel(currentRegistrationId);

      if (message) {
        setStatus(message, 'status-error');
      }
    }


    //====================================================
    // PAYLOAD VALIDATION
    //====================================================

    function validateQrPayload(rawPayload) {
      var payload = String(rawPayload || '').trim().toUpperCase();

      if (!payload) {
        return invalidValidation_('Empty QR payload.');
      }

      if (payload.indexOf('|') === -1) {
        return invalidValidation_(
          'Invalid ERS QR format.\n\nExpected:\n' +
          ERS_CONFIG.systemPrefix + '|' +
          ERS_CONFIG.eventCode + '|' +
          ERS_CONFIG.registrationPrefix + '-0001'
        );
      }

      var parts = payload.split('|');

      if (parts.length !== 3) {
        return invalidValidation_(
          'Invalid ERS QR structure.\n\nExpected 3 parts:\n' +
          'SYSTEM|EVENT CODE|REGISTRATION ID'
        );
      }

      var systemPrefix = String(parts[0] || '').trim().toUpperCase();
      var eventCode = String(parts[1] || '').trim().toUpperCase();
      var registrationId = String(parts[2] || '').trim().toUpperCase();

      if (systemPrefix !== ERS_CONFIG.systemPrefix) {
        return invalidValidation_(
          'Invalid QR system prefix.\n\nExpected: ' +
          ERS_CONFIG.systemPrefix +
          '\nFound: ' +
          systemPrefix
        );
      }

      if (eventCode !== ERS_CONFIG.eventCode) {
        return invalidValidation_(
          'Invalid event code.\n\nExpected: ' +
          ERS_CONFIG.eventCode +
          '\nFound: ' +
          eventCode
        );
      }

      var pattern = new RegExp(
        '^' +
        ERS_CONFIG.registrationPrefix +
        '-\\d{' +
        ERS_CONFIG.registrationDigits +
        '}$'
      );

      if (!pattern.test(registrationId)) {
        return invalidValidation_(
          'Invalid Registration ID format.\n\nFound:\n' +
          registrationId
        );
      }

      return {
        ok: true,
        code: 'VALID_ERS_QR',
        message: 'Valid ERS QR payload.',
        payload: payload,
        registrationId: registrationId
      };
    }


    function invalidValidation_(message) {
      return {
        ok: false,
        code: 'INVALID_QR_PAYLOAD',
        message: message,
        payload: '',
        registrationId: ''
      };
    }


    //====================================================
    // SCANNER EVENTS
    //====================================================

    function showScanSuccess(decodedText) {
      var now = Date.now();
      var payloadKey = normalizePayloadKey(decodedText);

      if (!scannerRunning || scannerState === SCANNER_STATE.STOPPED) {
        return;
      }

      // While an attendee is already captured or being processed,
      // keep tracking whether the same QR remains in view, but do not
      // start another transaction.
      if (scannerState !== SCANNER_STATE.SCANNING) {
        if (payloadKey && payloadKey === capturedPayloadKey) {
          lastQrSeenAt = now;
          qrClearStartedAt = 0;
          return;
        }

        // After the result display period, a different QR means the
        // previous attendee has moved away and the next attendee is ready.
        if (
          scannerState === SCANNER_STATE.WAITING_FOR_QR_CLEAR &&
          payloadKey &&
          payloadKey !== capturedPayloadKey
        ) {
          resetForNextScan(false);
          showScanSuccess(decodedText);
        }

        return;
      }

      // Debounce repeated invalid/non-ERS reads while still scanning.
      if (
        payloadKey === lastScannedValue &&
        now - lastScannedAt < 2000
      ) {
        return;
      }

      lastScannedValue = payloadKey;
      lastScannedAt = now;

      var validation = validateQrPayload(decodedText);

      if (!validation.ok) {
        clearCurrentAttendee();
        scannerState = SCANNER_STATE.SCANNING;

        setResult(
          'INVALID QR\n\n' +
          'Scanned:\n' +
          String(decodedText || '').trim() +
          '\n\nReason:\n' +
          validation.message,
          'result-invalid'
        );

        setStatus('Invalid ERS QR code. Try another QR.', 'status-error');

        if (navigator.vibrate) {
          navigator.vibrate([200, 80, 200]);
        }

        return;
      }

      currentValidation = validation;
      currentPayload = String(decodedText || '').trim();
      currentRegistrationId = validation.registrationId;
      capturedPayloadKey = payloadKey;
      lastQrSeenAt = now;
      scannerState = SCANNER_STATE.QR_CAPTURED;

      setCheckInButtonBusy(false);

      setResult(
        validation.message +
        '\n\nPayload:\n' +
        currentPayload +
        '\n\nRegistration ID:\n' +
        validation.registrationId,
        'result-valid'
      );

      showCheckInPanel(validation.registrationId);
      setStatus('Valid QR detected. Ready to check in.', 'status-ready');

      if (navigator.vibrate) {
        navigator.vibrate(150);
      }
    }


    function showScanError(errorMessage) {
      // The scanner reports misses constantly. We use those misses only
      // to confirm that the previous QR has left the camera view.
      tryAutomaticRearm();
    }


    //====================================================
    // ERS BACKEND CALL
    //====================================================

    function handleCheckInButtonClick() {
      if (checkingIn || scannerState !== SCANNER_STATE.QR_CAPTURED) {
        return;
      }

      if (!currentValidation || !currentValidation.ok || !currentRegistrationId) {
        setStatus('No valid ERS QR ready for check-in.', 'status-error');
        hideCheckInPanel();
        return;
      }

      if (!getScannerToken()) {
        setStatus('Enter scanner token/PIN first.', 'status-error');
        return;
      }

      if (!ERS_CONFIG.webAppUrl || ERS_CONFIG.webAppUrl.indexOf('/exec') === -1) {
        setStatus('Web app URL is missing or invalid.', 'status-error');

        setResult(
          'WEB APP URL ERROR\n\nConfigured URL:\n' +
          ERS_CONFIG.webAppUrl,
          'result-invalid'
        );

        return;
      }

      scannerState = SCANNER_STATE.SUBMITTING;
      setCheckInButtonBusy(true);
      setStatus('Sending check-in to ERS...', 'status-waiting');

      callMrQrEndpoint(currentPayload);
    }


    function callMrQrEndpoint(payload) {
      var callbackName =
        'mrQrCallback_' +
        Date.now() +
        '_' +
        Math.floor(Math.random() * 1000000);

      var requestCompleted = false;
      var timeoutId = null;
      var script = document.createElement('script');

      function finishRequest() {
        if (requestCompleted) {
          return false;
        }

        requestCompleted = true;

        if (timeoutId) {
          clearTimeout(timeoutId);
          timeoutId = null;
        }

        cleanupJsonp(callbackName, script);
        setCheckInButtonBusy(false);

        return true;
      }

      window[callbackName] = function(response) {
        if (!finishRequest()) return;
        handleBackendResponse(response);
      };

      var params = [
        'action=mrqrCheckIn',
        'callback=' + encodeURIComponent(callbackName),
        'payload=' + encodeURIComponent(payload),
        'token=' + encodeURIComponent(getScannerToken()),
        'station=' + encodeURIComponent(getStationName()),
        'operator=' + encodeURIComponent(getOperatorName())
      ].join('&');

      var separator = ERS_CONFIG.webAppUrl.indexOf('?') === -1 ? '?' : '&';
      var url = ERS_CONFIG.webAppUrl + separator + params;

      script.src = url;
      script.async = true;

      script.onerror = function() {
        if (!finishRequest()) return;

        restoreCapturedQrForRetry('Could not reach ERS endpoint. You may retry.');

        setResult(
          'CONNECTION ERROR\n\n' +
          'The scanner could not load the ERS endpoint.\n\n' +
          'URL tried:\n' +
          url,
          'result-invalid'
        );
      };

      timeoutId = setTimeout(function() {
        if (!finishRequest()) return;

        restoreCapturedQrForRetry('ERS endpoint timeout. You may retry.');

        setResult(
          'ENDPOINT TIMEOUT\n\n' +
          'The ERS endpoint did not respond within 10 seconds.\n\n' +
          'URL tried:\n' +
          url,
          'result-invalid'
        );
      }, ENDPOINT_TIMEOUT_MS);

      document.body.appendChild(script);
    }


    function cleanupJsonp(callbackName, script) {
      try {
        delete window[callbackName];
      } catch (error) {
        window[callbackName] = undefined;
      }

      if (script && script.parentNode) {
        script.parentNode.removeChild(script);
      }
    }


    function handleBackendResponse(response) {
      if (!response) {
        restoreCapturedQrForRetry('No response from ERS. You may retry.');
        setResult('NO RESPONSE FROM ERS', 'result-invalid');
        return;
      }

      if (response.code === 'CHECKIN_SUCCESS') {
        hideCheckInPanel();

        var ersData = response.data && response.data.ers ? response.data.ers : {};

        setStatus('Checked in successfully.', 'status-ready');

        setResult(
          response.title +
          '\n\n' +
          (ersData.name || '') +
          '\n\nRegistration:\n' +
          (response.data.registrationId || currentRegistrationId) +
          '\n\nChecked In:\n' +
          (ersData.checkedInTime || ''),
          'result-valid'
        );

        if (navigator.vibrate) {
          navigator.vibrate([100, 80, 100]);
        }

        scheduleAutomaticRearm();
        return;
      }

      if (response.code === 'CHECKIN_DUPLICATE') {
        hideCheckInPanel();

        var dupData = response.data && response.data.ers ? response.data.ers : {};

        setStatus('Duplicate check-in.', 'status-waiting');

        setResult(
          response.title +
          '\n\n' +
          (dupData.name || '') +
          '\n\nAlready checked in.\n\nOriginal Check-In:\n' +
          (dupData.originalCheckInTime || '') +
          '\n\nScanned Again:\n' +
          (dupData.scannedAgainTime || ''),
          'result-duplicate'
        );

        if (navigator.vibrate) {
          navigator.vibrate([200, 80, 200]);
        }

        scheduleAutomaticRearm();
        return;
      }

      setStatus(response.title || 'ERS error.', 'status-error');

      setResult(
        (response.title || 'ERS ERROR') +
        '\n\n' +
        (response.message || 'Unknown error.') +
        '\n\nCode:\n' +
        (response.code || ''),
        'result-invalid'
      );

      if (navigator.vibrate) {
        navigator.vibrate([300, 80, 300]);
      }

      var retryableCodes = {
        MR_QR_NO_TOKEN: true,
        MR_QR_INVALID_TOKEN: true,
        MR_QR_SERVER_ERROR: true
      };

      if (retryableCodes[response.code]) {
        restoreCapturedQrForRetry(
          (response.title || 'ERS error.') + ' Correct the issue and retry.'
        );
      } else {
        hideCheckInPanel();
        scheduleAutomaticRearm();
      }
    }


    //====================================================
    // CAMERA CONTROL
    //====================================================

    function startScanner() {
      if (scannerRunning) {
        setStatus('Camera already running.', 'status-ready');
        return;
      }

      if (!window.Html5Qrcode) {
        setStatus('QR scanner library did not load.', 'status-error');
        return;
      }

      clearResultTimer();
      setStatus('Requesting camera permission...', 'status-waiting');

      html5QrCode = new Html5Qrcode('reader');

      Html5Qrcode.getCameras()
        .then(function(cameras) {
          if (!cameras || cameras.length === 0) {
            throw new Error('No camera found on this device.');
          }

          var selectedCameraId = chooseBackCamera(cameras);

          return html5QrCode.start(
            selectedCameraId,
            {
              fps: 10,
              qrbox: {
                width: 250,
                height: 250
              },
              aspectRatio: 1.0
            },
            showScanSuccess,
            showScanError
          );
        })
        .then(function() {
          scannerRunning = true;
          resetForNextScan(false);
          setStatus('Camera running. Point at ERS QR code.', 'status-ready');
          setResult('Ready for next scan.', '');
        })
        .catch(function(error) {
          scannerRunning = false;
          scannerState = SCANNER_STATE.STOPPED;

          setStatus(
            'Camera error: ' + getReadableError(error),
            'status-error'
          );
        });
    }


    function chooseBackCamera(cameras) {
      for (var i = 0; i < cameras.length; i++) {
        var label = String(cameras[i].label || '').toLowerCase();

        if (
          label.indexOf('back') !== -1 ||
          label.indexOf('rear') !== -1 ||
          label.indexOf('environment') !== -1
        ) {
          return cameras[i].id;
        }
      }

      return cameras[cameras.length - 1].id;
    }


    function stopScanner() {
      clearResultTimer();

      if (!html5QrCode || !scannerRunning) {
        scannerRunning = false;
        scannerState = SCANNER_STATE.STOPPED;
        clearCurrentAttendee();
        setStatus('Camera is not running.', 'status-waiting');
        return;
      }

      html5QrCode.stop()
        .then(function() {
          scannerRunning = false;
          scannerState = SCANNER_STATE.STOPPED;
          clearCurrentAttendee();
          setStatus('Camera stopped.', 'status-waiting');
        })
        .catch(function(error) {
          setStatus(
            'Stop error: ' + getReadableError(error),
            'status-error'
          );
        });
    }


    function getReadableError(error) {
      if (!error) return 'Unknown error';
      if (typeof error === 'string') return error;
      if (error.message) return error.message;
      return JSON.stringify(error);
    }


    window.onload = function() {
      loadScannerSettings();
    };

  </script>
</body>
</html>
